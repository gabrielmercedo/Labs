<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de login</title>

    <link rel="stylesheet" href="login.css">

</head>

<body>
    <h1>FastMed</h1>
    

    <form
       action ="/cadastro"
    method="post"
    autocomplete="on"
    enctype="multipart/form-data">

    <fieldset>Login</fieldset>

    <div class="alinhar">
        <label for="name"></label>
                <input type="text"
                    name="nome"
                    id="name"
                    placeholder="Digite seu usuario"
                    required>
    </div>
    <div class="alinhar">
        <label for="senha"></label>
        <input type="password"
            name="senha"
            id="senha"
            aria-describedby="senha-help"
            minlength="8"
            placeholder="Senha"
            required>
    </div>
    <div class="alinhar">
        <small><button>Esqueci minha senha</button></small>
    </div>

    
</body>
</html>
